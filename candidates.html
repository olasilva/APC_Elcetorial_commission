<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · Winner Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <style>
        :root {
            --navy-deep: #0a1628;
            --navy-panel: #0f2035;
            --text-primary: #dde4ed;
            --text-secondary: #8da0b8;
            --green: #00a86b;
            --gold: #c4a030;
            --border: rgba(255, 255, 255, 0.07);
            --red: #d94a4a;
            --amber: #d4a030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 1.75rem;
            background: rgba(10, 22, 40, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-brand img {
            height: 30px;
        }

        .nav-brand .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
        }

        .nav-brand .logo-text span {
            color: var(--green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: rgba(13, 25, 42, 0.6);
            border-right: 1px solid var(--border);
            padding: 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #5a7795;
            padding: 0.6rem 0.9rem 0.4rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.12s ease;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.84rem;
            margin-bottom: 0.1rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #c0d0e0;
        }

        .nav-item.active {
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            font-weight: 600;
        }

        .nav-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #eef2f7;
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-input {
            background: rgba(20, 40, 60, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.55rem 0.9rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            min-width: 200px;
            outline: none;
        }

        .filter-input:focus {
            border-color: var(--green);
        }

        .filter-select {
            background: rgba(20, 40, 60, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.55rem 0.9rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .btn-primary {
            background: var(--green);
            border: none;
            color: #fff;
            padding: 0.55rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            background: #00955e;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--navy-panel);
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .data-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .data-table th:hover {
            color: #c0d0e0;
        }

        .data-table td {
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-verified {
            background: rgba(0, 168, 107, 0.15);
            color: var(--green);
        }

        .badge-pending {
            background: rgba(212, 160, 48, 0.1);
            color: var(--amber);
        }

        .badge-disputed {
            background: rgba(217, 74, 74, 0.1);
            color: var(--red);
        }

        .btn-link {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
            padding: 0.35rem 0.7rem;
            border-radius: 0.35rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.12s ease;
        }

        .btn-link:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.35rem;
            margin-top: 1.5rem;
        }

        .page-btn {
            padding: 0.4rem 0.8rem;
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 0.35rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .page-btn.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 55px;
            }
            .nav-item span,
            .sidebar-label {
                display: none;
            }
        }
    </style>
</head>
<body>
   <nav class="top-nav">
    <!-- Left: Brand -->
    <div class="nav-brand">
        <img src="assets/apc2.png" alt="APC" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">APC<span>.</span></span>
    </div>
    
    <!-- Center: Hamburger (mobile only) -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Right: Status items -->
    <div class="nav-status">
        <span class="nav-pill nav-pill-live">
            <span class="pulse-dot"></span> Live
        </span>
        <span class="nav-pill nav-pill-role" id="roleBadge">
            <i class="fas fa-shield-alt"></i> Admin
        </span>
        <span class="nav-time" id="liveClock">--:--:--</span>
    </div>
</nav>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-label">Platform</div>
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-compass"></i> <span>Command Center</span>
            </button>
            <button class="nav-item active">
                <i class="fas fa-database"></i> <span>Winner Registry</span>
            </button>
            <button class="nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-bar"></i> <span>Analytics</span>
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i> <span>Profiles</span>
            </button>
            <div class="sidebar-label">System</div>
            <button class="nav-item" onclick="window.location.href='admin.html'">
                <i class="fas fa-shield-alt"></i> <span>Administration</span>
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sign Out</span>
            </button>
        </aside>

        <main class="content-area">
            <h2 class="page-title">Winner Registry</h2>
            <p class="page-subtitle">Verified primary election winners — APC 2026</p>

            <div class="filter-bar">
                <input type="text" class="filter-input" placeholder="Search by name or constituency..." id="searchInput" onkeyup="filterTable()">
                <select class="filter-select" id="stateFilter" onchange="filterTable()">
                    <option value="">All States</option>
                    <option>Kano</option><option>Kaduna</option><option>Lagos</option>
                    <option>Borno</option><option>Rivers</option><option>Enugu</option>
                    <option>Ogun</option><option>Delta</option><option>Kwara</option>
                </select>
                <select class="filter-select" id="officeFilter" onchange="filterTable()">
                    <option value="">All Offices</option>
                    <option>Governor</option><option>Senate</option>
                    <option>House of Representatives</option><option>State Assembly</option>
                </select>
                <select class="filter-select" id="statusFilter" onchange="filterTable()">
                    <option value="">All Status</option>
                    <option>Verified</option><option>Pending</option><option>Disputed</option>
                </select>
                <button class="btn-primary" onclick="exportData()">
                    <i class="fas fa-download"></i> Export CSV
                </button>
            </div>

            <div style="overflow-x:auto;">
                <table class="data-table" id="candidatesTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">Candidate</th>
                            <th onclick="sortTable(1)">Office</th>
                            <th onclick="sortTable(2)">State</th>
                            <th onclick="sortTable(3)">Constituency</th>
                            <th onclick="sortTable(4)">Votes</th>
                            <th onclick="sortTable(5)">Date</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script>
        const candidates = [
            { name: 'Hon. Musa Ibrahim', office: 'Senate', state: 'Kano', constituency: 'Kano Central', votes: 1248, date: '2026-05-07', status: 'Verified' },
            { name: 'Fatima Bello', office: 'House of Representatives', state: 'Kaduna', constituency: 'Kaduna North', votes: 876, date: '2026-05-06', status: 'Verified' },
            { name: 'Dr. Chidi Okonkwo', office: 'Governor', state: 'Enugu', constituency: 'Statewide', votes: 2103, date: '2026-05-05', status: 'Verified' },
            { name: 'Aliyu Sani', office: 'State Assembly', state: 'Borno', constituency: 'Maiduguri Metro', votes: 432, date: '2026-05-07', status: 'Verified' },
            { name: 'Kashim Ibrahim', office: 'Senate', state: 'Borno', constituency: 'Borno Central', votes: 987, date: '2026-05-04', status: 'Verified' },
            { name: 'Aisha Bello', office: 'House of Representatives', state: 'Kwara', constituency: 'Ilorin West', votes: 654, date: '2026-05-03', status: 'Pending' },
            { name: 'Yakubu Mohammed', office: 'Senate', state: 'Katsina', constituency: 'Katsina Central', votes: 1123, date: '2026-05-06', status: 'Verified' },
            { name: 'Ngozi Adeola', office: 'House of Representatives', state: 'Ogun', constituency: 'Ogun West', votes: 543, date: '2026-05-05', status: 'Disputed' },
            { name: 'Emeka Nwankwo', office: 'Governor', state: 'Anambra', constituency: 'Statewide', votes: 1876, date: '2026-05-04', status: 'Verified' },
            { name: 'Zainab Usman', office: 'State Assembly', state: 'Kano', constituency: 'Kano Municipal', votes: 321, date: '2026-05-07', status: 'Verified' },
            { name: 'Ibrahim Tanko', office: 'Senate', state: 'Plateau', constituency: 'Plateau North', votes: 876, date: '2026-05-03', status: 'Pending' },
            { name: 'Grace Okonkwo', office: 'House of Representatives', state: 'Delta', constituency: 'Delta Central', votes: 765, date: '2026-05-06', status: 'Verified' },
            { name: 'Samuel Ortom', office: 'Governor', state: 'Benue', constituency: 'Statewide', votes: 2345, date: '2026-05-05', status: 'Verified' },
            { name: 'Maryam Sani', office: 'State Assembly', state: 'Kaduna', constituency: 'Zaria City', votes: 298, date: '2026-05-07', status: 'Disputed' },
            { name: 'Abdullahi Rabiu', office: 'Senate', state: 'Kano', constituency: 'Kano South', votes: 1456, date: '2026-05-04', status: 'Verified' }
        ];

        // Update clock in top nav
function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        const options = {
            timeZone: 'Africa/Lagos',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        clockEl.textContent = now.toLocaleTimeString('en-NG', options) + ' WAT';
    }

    // Also update role badge
    const roleEl = document.getElementById('roleText');
    if (roleEl && roleEl.textContent === 'Loading...') {
        const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
        if (user.role) {
            roleEl.textContent = user.role.replace(/_/g, ' ').toUpperCase();
        }
    }
}

// Run immediately and then every second
updateClock();
setInterval(updateClock, 1000);
        let currentPage = 1;
        const rowsPerPage = 10;
        let filteredData = [...candidates];

        function renderTable(data) {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = data.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map(c => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.office}</td>
                    <td>${c.state}</td>
                    <td>${c.constituency}</td>
                    <td>${c.votes.toLocaleString()}</td>
                    <td>${c.date}</td>
                    <td><span class="status-badge badge-${c.status.toLowerCase()}">${c.status}</span></td>
                    <td><button class="btn-link" onclick="viewProfile('${c.name}')">View</button></td>
                </tr>
            `).join('');

            renderPagination(data.length);
        }

        function renderPagination(totalRows) {
            const totalPages = Math.ceil(totalRows / rowsPerPage);
            const pagination = document.getElementById('pagination');
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable(filteredData);
        }

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const stateFilter = document.getElementById('stateFilter').value;
            const officeFilter = document.getElementById('officeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            filteredData = candidates.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(searchTerm) || 
                                   c.state.toLowerCase().includes(searchTerm) ||
                                   c.constituency.toLowerCase().includes(searchTerm);
                const matchState = !stateFilter || c.state === stateFilter;
                const matchOffice = !officeFilter || c.office === officeFilter;
                const matchStatus = !statusFilter || c.status === statusFilter;
                return matchSearch && matchState && matchOffice && matchStatus;
            });

            currentPage = 1;
            renderTable(filteredData);
        }

        function sortTable(column) {
            const keys = ['name', 'office', 'state', 'constituency', 'votes', 'date'];
            const key = keys[column];
            filteredData.sort((a, b) => {
                if (typeof a[key] === 'string') return a[key].localeCompare(b[key]);
                return a[key] - b[key];
            });
            renderTable(filteredData);
        }

        function viewProfile(name) {
            window.location.href = `profile.html?candidate=${encodeURIComponent(name)}`;
        }

        function exportData() {
            const csv = 'Name,Office,State,Constituency,Votes,Date,Status\n' + 
                filteredData.map(c => `${c.name},${c.office},${c.state},${c.constituency},${c.votes},${c.date},${c.status}`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'apc_winners_registry_2026.csv';
            a.click();
        }

        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }
            renderTable(candidates);
            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' WAT';
            }, 1000);
        });
    </script>

    <script>
// Quick test for hamburger button
document.addEventListener('DOMContentLoaded', function() {
    // Find or create a test button
    var btn = document.querySelector('.hamburger-btn');
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'hamburger-btn';
        btn.innerHTML = '<i class="fas fa-bars"></i>';
        btn.style.cssText = 'display:flex;position:fixed;top:70px;right:20px;z-index:9999;background:#00a86b;color:#fff;width:44px;height:44px;border-radius:8px;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;';
        document.body.appendChild(btn);
    }
    
    var sidebar = document.querySelector('.sidebar');
    
    btn.onclick = function() {
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
            if (sidebar.classList.contains('mobile-open')) {
                sidebar.style.transform = 'translateX(0)';
                btn.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                btn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        }
    };
});
</script>
</body>
</html>

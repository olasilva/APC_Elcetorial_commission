<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | Winner Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --deep-green: #006647;
            --gold: #d4af37;
            --midnight: #020c17;
            --intel-blue: #0f283f;
            --text-primary: #e6edf3;
            --text-secondary: #9bb7d4;
            --accent-green: #00b87a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--midnight);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: rgba(2, 13, 26, 0.95);
            border-bottom: 1px solid rgba(0, 180, 120, 0.3);
            backdrop-filter: blur(20px);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .apc-emblem {
            background: linear-gradient(135deg, #0a4b33, #043322);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid var(--gold);
            color: #f5e7c6;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .sentinel-logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .sentinel-logo span {
            color: var(--accent-green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 260px;
            background: rgba(5, 16, 30, 0.9);
            border-right: 1px solid rgba(0, 180, 120, 0.2);
            padding: 1.5rem 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 184, 122, 0.15);
            color: var(--accent-green);
        }

        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .search-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-control {
            background: rgba(15, 35, 55, 0.8);
            border: 1px solid rgba(0, 180, 120, 0.25);
            border-radius: 0.8rem;
            padding: 0.7rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            min-width: 180px;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            background: rgba(15, 35, 55, 0.8);
            border: 1px solid rgba(0, 180, 120, 0.25);
            border-radius: 0.8rem;
            padding: 0.7rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent-green);
            color: white;
        }

        .btn-primary:hover {
            background: #00d48f;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(8, 20, 32, 0.7);
            border-radius: 1rem;
            overflow: hidden;
        }

        .data-table th {
            text-align: left;
            padding: 1rem;
            background: #06212e;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b9d1c2;
            cursor: pointer;
        }

        .data-table th:hover {
            color: var(--accent-green);
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid #1a3a40;
        }

        .candidate-cell {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .candidate-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1e3b51;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--gold);
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-verified {
            background: rgba(0, 168, 107, 0.2);
            color: #00e08a;
        }

        .status-pending {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }

        .status-disputed {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: rgba(15, 35, 55, 0.8);
            border: 1px solid rgba(0, 180, 120, 0.25);
            border-radius: 0.5rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        .page-btn.active {
            background: var(--accent-green);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="apc-emblem">
    <img src="assets/apc2.png" alt="APC Logo" class="apc-logo-img">
</div>
            <div class="sentinel-logo">SENTINEL<span>.</span></div>
        </div>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span id="liveClock"></span>
            <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-th-large"></i> Dashboard
            </button>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-th-large"></i> Command Center
            </button>
            <button class="nav-item active">
                <i class="fas fa-database"></i> Winner Registry
            </button>
            <button class="nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> Analytics
            </button>
            <button class="nav-item" onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i> Profiles
            </button>
            <button class="nav-item" onclick="window.location.href='admin.html'">
                <i class="fas fa-cog"></i> Admin
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main class="content-area">
            <h2 style="margin-bottom:1.5rem; color: var(--gold);">
                <i class="fas fa-database"></i> WINNER REGISTRY DATABASE
            </h2>

            <div class="search-filters">
                <input type="text" class="search-input" placeholder="🔍 Search by name, state, or constituency..." id="searchInput" onkeyup="filterTable()">
                <select class="filter-control" id="stateFilter" onchange="filterTable()">
                    <option value="">All States</option>
                    <option>Lagos</option><option>Kano</option><option>Kaduna</option>
                    <option>Borno</option><option>Rivers</option><option>Enugu</option>
                    <option>Oyo</option><option>Katsina</option><option>Anambra</option>
                </select>
                <select class="filter-control" id="officeFilter" onchange="filterTable()">
                    <option value="">All Offices</option>
                    <option>Governor</option><option>Senate</option>
                    <option>House of Reps</option><option>State Assembly</option>
                </select>
                <select class="filter-control" id="statusFilter" onchange="filterTable()">
                    <option value="">All Status</option>
                    <option>Verified</option><option>Pending</option><option>Disputed</option>
                </select>
                <button class="btn btn-primary" onclick="exportData()">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>

            <div style="overflow-x: auto;">
                <table class="data-table" id="candidatesTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">Candidate ↕</th>
                            <th onclick="sortTable(1)">Office ↕</th>
                            <th onclick="sortTable(2)">State ↕</th>
                            <th onclick="sortTable(3)">Constituency ↕</th>
                            <th onclick="sortTable(4)">Votes ↕</th>
                            <th onclick="sortTable(5)">Date Declared ↕</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script>
        // Full candidate database
        const candidates = [
            { name: 'Hon. Musa Ibrahim', office: 'Senate', state: 'Kano', constituency: 'Kano Central', votes: 1248, date: '2026-05-07', status: 'Verified', gender: 'Male' },
            { name: 'Fatima Bello', office: 'House of Reps', state: 'Kaduna', constituency: 'Kaduna North', votes: 876, date: '2026-05-06', status: 'Verified', gender: 'Female' },
            { name: 'Dr. Chidi Okonkwo', office: 'Governor', state: 'Enugu', constituency: 'Statewide', votes: 2103, date: '2026-05-05', status: 'Verified', gender: 'Male' },
            { name: 'Aliyu Sani', office: 'State Assembly', state: 'Borno', constituency: 'Maiduguri Metro', votes: 432, date: '2026-05-07', status: 'Verified', gender: 'Male' },
            { name: 'Kashim Ibrahim', office: 'Senate', state: 'Borno', constituency: 'Borno Central', votes: 987, date: '2026-05-04', status: 'Verified', gender: 'Male' },
            { name: 'Aisha Bello', office: 'House of Reps', state: 'Kwara', constituency: 'Ilorin West', votes: 654, date: '2026-05-03', status: 'Pending', gender: 'Female' },
            { name: 'Yakubu Mohammed', office: 'Senate', state: 'Katsina', constituency: 'Katsina Central', votes: 1123, date: '2026-05-06', status: 'Verified', gender: 'Male' },
            { name: 'Ngozi Adeola', office: 'House of Reps', state: 'Ogun', constituency: 'Ogun West', votes: 543, date: '2026-05-05', status: 'Disputed', gender: 'Female' },
            { name: 'Emeka Nwankwo', office: 'Governor', state: 'Anambra', constituency: 'Statewide', votes: 1876, date: '2026-05-04', status: 'Verified', gender: 'Male' },
            { name: 'Zainab Usman', office: 'State Assembly', state: 'Kano', constituency: 'Kano Municipal', votes: 321, date: '2026-05-07', status: 'Verified', gender: 'Female' },
            { name: 'Ibrahim Tanko', office: 'Senate', state: 'Plateau', constituency: 'Plateau North', votes: 876, date: '2026-05-03', status: 'Pending', gender: 'Male' },
            { name: 'Grace Okonkwo', office: 'House of Reps', state: 'Delta', constituency: 'Delta Central', votes: 765, date: '2026-05-06', status: 'Verified', gender: 'Female' },
            { name: 'Samuel Ortom', office: 'Governor', state: 'Benue', constituency: 'Statewide', votes: 2345, date: '2026-05-05', status: 'Verified', gender: 'Male' },
            { name: 'Maryam Sani', office: 'State Assembly', state: 'Kaduna', constituency: 'Zaria City', votes: 298, date: '2026-05-07', status: 'Disputed', gender: 'Female' },
            { name: 'Abdullahi Rabiu', office: 'Senate', state: 'Kano', constituency: 'Kano South', votes: 1456, date: '2026-05-04', status: 'Verified', gender: 'Male' }
        ];

        let currentPage = 1;
        const rowsPerPage = 8;
        let filteredData = [...candidates];

        function renderTable(data) {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = data.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map(c => `
                <tr>
                    <td>
                        <div class="candidate-cell">
                            <div class="candidate-avatar">
                                <i class="fas fa-user"></i>
                            </div>
                            <strong>${c.name}</strong>
                        </div>
                    </td>
                    <td>${c.office}</td>
                    <td>${c.state}</td>
                    <td>${c.constituency}</td>
                    <td>${c.votes.toLocaleString()}</td>
                    <td>${c.date}</td>
                    <td><span class="status-badge status-${c.status.toLowerCase()}">${c.status}</span></td>
                    <td>
                        <button class="btn" style="background:transparent; border:1px solid var(--accent-green); color:var(--accent-green); padding:0.3rem 0.8rem; border-radius:0.5rem; cursor:pointer;" onclick="viewProfile('${c.name}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </td>
                </tr>
            `).join('');

            renderPagination(data.length);
        }

        function renderPagination(totalRows) {
            const totalPages = Math.ceil(totalRows / rowsPerPage);
            const pagination = document.getElementById('pagination');
            let html = '';
            
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable(filteredData);
        }

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const stateFilter = document.getElementById('stateFilter').value;
            const officeFilter = document.getElementById('officeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            filteredData = candidates.filter(c => {
                const matchSearch = c.name.toLowerCase().includes(searchTerm) || 
                                   c.state.toLowerCase().includes(searchTerm) ||
                                   c.constituency.toLowerCase().includes(searchTerm);
                const matchState = !stateFilter || c.state === stateFilter;
                const matchOffice = !officeFilter || c.office === officeFilter;
                const matchStatus = !statusFilter || c.status === statusFilter;
                
                return matchSearch && matchState && matchOffice && matchStatus;
            });

            currentPage = 1;
            renderTable(filteredData);
        }

        function sortTable(column) {
            const keys = ['name', 'office', 'state', 'constituency', 'votes', 'date'];
            const key = keys[column];
            
            filteredData.sort((a, b) => {
                if (typeof a[key] === 'string') {
                    return a[key].localeCompare(b[key]);
                }
                return a[key] - b[key];
            });
            
            renderTable(filteredData);
        }

        function viewProfile(name) {
            window.location.href = `profile.html?candidate=${encodeURIComponent(name)}`;
        }

        function exportData() {
            const csv = 'Name,Office,State,Constituency,Votes,Date,Status\n' + 
                filteredData.map(c => `${c.name},${c.office},${c.state},${c.constituency},${c.votes},${c.date},${c.status}`).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sentinel_winners_registry.csv';
            a.click();
        }

        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }
            
            renderTable(candidates);
            
            // Live clock
            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour12: false });
            }, 1000);
        });
    </script>
</body>
</html>

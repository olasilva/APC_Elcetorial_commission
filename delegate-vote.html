<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · Voting Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <script src="js/mobile-nav.js"></script>
    <style>
        :root {
            --navy-deep: #0a1628;
            --navy-panel: #0f2035;
            --text-primary: #dde4ed;
            --text-secondary: #8da0b8;
            --green: #00a86b;
            --gold: #c4a030;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 1.75rem;
            background: rgba(10, 22, 40, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-brand img {
            height: 30px;
        }

        .nav-brand .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
        }

        .nav-brand .logo-text span {
            color: var(--green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: rgba(13, 25, 42, 0.6);
            border-right: 1px solid var(--border);
            padding: 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #5a7795;
            padding: 0.6rem 0.9rem 0.4rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.12s ease;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.84rem;
            margin-bottom: 0.1rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #c0d0e0;
        }

        .nav-item.active {
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            font-weight: 600;
        }

        .nav-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .voting-header {
            background: linear-gradient(135deg, rgba(0, 120, 60, 0.2), rgba(0, 60, 30, 0.1));
            border: 1px solid rgba(0, 168, 107, 0.2);
            border-radius: 0.85rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .candidate-card {
            background: var(--navy-panel);
            border: 2px solid var(--border);
            border-radius: 0.85rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
        }

        .candidate-card:hover {
            border-color: rgba(0, 168, 107, 0.3);
        }

        .candidate-card.selected {
            border-color: var(--green);
            background: rgba(0, 168, 107, 0.06);
        }

        .candidate-card.voted {
            opacity: 0.4;
            pointer-events: none;
        }

        .candidate-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            margin: 0 auto 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border);
            font-size: 1.8rem;
        }

        .selected .candidate-avatar {
            border-color: var(--gold);
        }

        .check-indicator {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected .check-indicator {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: background 0.12s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--green);
            color: #fff;
            width: 100%;
            justify-content: center;
            margin-top: 1.5rem;
            padding: 1rem;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: #00955e;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 450px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 55px;
            }
            .nav-item span,
            .sidebar-label {
                display: none;
            }
        }
    </style>
</head>
<body>
   <nav class="top-nav">
    <!-- Left: Brand -->
    <div class="nav-brand">
        <img src="assets/apc2.png" alt="APC" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">APC<span>.</span></span>
    </div>
    
    <!-- Center: Hamburger (mobile only) -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Right: Status items -->
    <div class="nav-status">
        <span class="nav-pill nav-pill-live">
            <span class="pulse-dot"></span> Live
        </span>
        <span class="nav-pill nav-pill-role" id="roleBadge">
            <i class="fas fa-shield-alt"></i> Admin
        </span>
        <span class="nav-time" id="liveClock">--:--:--</span>
    </div>
</nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-label">Elections</div>
            <button class="nav-item" onclick="window.location.href='primaries.html'">
                <i class="fas fa-vote-yea"></i> <span>Primary Elections</span>
            </button>
            <button class="nav-item" onclick="window.location.href='accreditation.html'">
                <i class="fas fa-id-card"></i> <span>Accreditation</span>
            </button>
            <button class="nav-item active">
                <i class="fas fa-check-circle"></i> <span>Voting Portal</span>
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sign Out</span>
            </button>
        </aside>

        <main class="content-area" id="votingArea">
            <div class="voting-header">
                <div>
                    <h2 style="font-size:1.1rem;">Cast Your Vote</h2>
                    <p style="color:var(--text-secondary);font-size:0.8rem;">Senate Primary — Kano Central</p>
                </div>
                <div style="text-align:right;">
                    <span style="color:var(--green);font-size:0.75rem;font-weight:600;">✓ Accredited Delegate</span>
                </div>
            </div>

            <div class="candidates-grid" id="candidatesGrid"></div>

            <button class="btn btn-primary" id="submitVoteBtn" disabled onclick="submitVote()">
                <i class="fas fa-check-circle"></i> Submit Vote
            </button>
        </main>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div style="font-size:3rem;margin-bottom:1rem;">🗳️</div>
            <h3 style="color:var(--gold);margin-bottom:0.75rem;">Vote Recorded</h3>
            <p style="color:var(--text-secondary);margin-bottom:1rem;">Your vote has been securely transmitted.</p>
            <div style="background:rgba(0,0,0,0.2);padding:0.75rem;border-radius:0.5rem;margin-bottom:1rem;font-size:0.8rem;">
                <p><strong>Transaction ID:</strong> APC-2026-8472-KC</p>
                <p><strong>Timestamp:</strong> <span id="voteTimestamp"></span></p>
            </div>
            <button class="btn btn-primary" onclick="window.location.href='primaries.html'">
                Return to Elections
            </button>
        </div>
    </div>

    <script>
        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        const candidates = [
            { id: 1, name: 'Hon. Musa Ibrahim', bio: 'Former Commissioner, Legal Practitioner', icon: '👨‍💼' },
            { id: 2, name: 'Dr. Amina Yusuf', bio: 'Medical Doctor, Philanthropist', icon: '👩‍⚕️' },
            { id: 3, name: 'Alhaji Sani Bello', bio: 'Businessman, Community Leader', icon: '👨‍💼' },
            { id: 4, name: 'Barr. Fatima Usman', bio: 'Legal Practitioner, Activist', icon: '👩‍💼' }
        ];

        let selectedCandidate = null;

        function renderCandidates() {
            const grid = document.getElementById('candidatesGrid');
            grid.innerHTML = candidates.map(c => `
                <div class="candidate-card" id="candidate-${c.id}" onclick="selectCandidate(${c.id})">
                    <div class="check-indicator">
                        <i class="fas fa-check" style="font-size:0.7rem;display:none;"></i>
                    </div>
                    <div class="candidate-avatar">${c.icon}</div>
                    <h3 style="font-size:1rem;margin-bottom:0.3rem;">${c.name}</h3>
                    <p style="color:var(--text-secondary);font-size:0.8rem;">${c.bio}</p>
                    <span style="display:inline-block;background:rgba(0,168,107,0.1);color:var(--green);padding:0.2rem 0.7rem;border-radius:2rem;font-size:0.7rem;margin-top:0.5rem;">APC</span>
                </div>
            `).join('');
        }

        // Update clock in top nav
function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        const options = {
            timeZone: 'Africa/Lagos',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        clockEl.textContent = now.toLocaleTimeString('en-NG', options) + ' WAT';
    }

    // Also update role badge
    const roleEl = document.getElementById('roleText');
    if (roleEl && roleEl.textContent === 'Loading...') {
        const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
        if (user.role) {
            roleEl.textContent = user.role.replace(/_/g, ' ').toUpperCase();
        }
    }
}

// Run immediately and then every second
updateClock();
setInterval(updateClock, 1000);
        function selectCandidate(id) {
            if (selectedCandidate === id) {
                selectedCandidate = null;
                document.getElementById('submitVoteBtn').disabled = true;
            } else {
                selectedCandidate = id;
                document.getElementById('submitVoteBtn').disabled = false;
            }

            document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
            document.querySelectorAll('.check-indicator i').forEach(i => i.style.display = 'none');

            const card = document.getElementById(`candidate-${id}`);
            if (card && selectedCandidate === id) {
                card.classList.add('selected');
                card.querySelector('.check-indicator i').style.display = 'block';
            }
        }

        function submitVote() {
            if (!selectedCandidate) return;

            const candidate = candidates.find(c => c.id === selectedCandidate);
            sessionStorage.setItem('vote_cast', 'true');
            sessionStorage.setItem('voted_candidate', candidate.name);
            sessionStorage.setItem('vote_time', new Date().toISOString());

            document.getElementById('voteTimestamp').textContent = 
                new Date().toLocaleString('en-NG', { timeZone: 'Africa/Lagos' });
            document.getElementById('confirmModal').classList.add('show');

            document.querySelectorAll('.candidate-card').forEach(c => c.classList.add('voted'));
            document.getElementById('submitVoteBtn').disabled = true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('delegate_accredited')) {
                alert('You must be accredited before voting.');
                window.location.href = 'accreditation.html';
                return;
            }

            if (sessionStorage.getItem('vote_cast')) {
                document.getElementById('votingArea').innerHTML = `
                    <div style="text-align:center;padding:3rem;">
                        <div style="font-size:4rem;margin-bottom:1rem;">✓</div>
                        <h2 style="color:var(--green);margin-bottom:0.75rem;">You Have Voted</h2>
                        <p style="color:var(--text-secondary);margin-bottom:1rem;">
                            Your vote for <strong>${sessionStorage.getItem('voted_candidate')}</strong> has been recorded.
                        </p>
                        <button class="btn btn-primary" onclick="window.location.href='primaries.html'">
                            Return to Elections
                        </button>
                    </div>
                `;
                return;
            }

            renderCandidates();

            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' WAT';
            }, 1000);
        });
    </script>

    <script>
// Quick test for hamburger button
document.addEventListener('DOMContentLoaded', function() {
    // Find or create a test button
    var btn = document.querySelector('.hamburger-btn');
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'hamburger-btn';
        btn.innerHTML = '<i class="fas fa-bars"></i>';
        btn.style.cssText = 'display:flex;position:fixed;top:70px;right:20px;z-index:9999;background:#00a86b;color:#fff;width:44px;height:44px;border-radius:8px;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;';
        document.body.appendChild(btn);
    }
    
    var sidebar = document.querySelector('.sidebar');
    
    btn.onclick = function() {
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
            if (sidebar.classList.contains('mobile-open')) {
                sidebar.style.transform = 'translateX(0)';
                btn.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                btn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        }
    };
});
</script>
</body>
</html>

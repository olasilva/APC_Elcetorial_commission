<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · Field Submission</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <script src="js/mobile-nav.js"></script>
    <style>
        :root {
            --navy-deep: #0a1628;
            --navy-panel: #0f2035;
            --text-primary: #dde4ed;
            --text-secondary: #8da0b8;
            --green: #00a86b;
            --gold: #c4a030;
            --border: rgba(255, 255, 255, 0.07);
            --amber: #d4a030;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 1.75rem;
            background: rgba(10, 22, 40, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-brand img {
            height: 30px;
        }

        .nav-brand .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
        }

        .nav-brand .logo-text span {
            color: var(--green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: rgba(13, 25, 42, 0.6);
            border-right: 1px solid var(--border);
            padding: 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #5a7795;
            padding: 0.6rem 0.9rem 0.4rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.12s ease;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.84rem;
            margin-bottom: 0.1rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #c0d0e0;
        }

        .nav-item.active {
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            font-weight: 600;
        }

        .nav-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .submission-card {
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .card-subtitle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            background: rgba(20, 40, 60, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.6rem 0.8rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            border-color: var(--green);
        }

        select.form-input {
            cursor: pointer;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-upload-area:hover {
            border-color: var(--green);
            background: rgba(0, 168, 107, 0.03);
        }

        .file-upload-area i {
            font-size: 2rem;
            color: var(--green);
            margin-bottom: 0.5rem;
        }

        .status-message {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
            font-size: 0.82rem;
        }

        .status-success {
            display: block;
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            border: 1px solid rgba(0, 168, 107, 0.2);
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--green);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            background: #00955e;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 55px;
            }
            .nav-item span,
            .sidebar-label {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
    <!-- Left: Brand -->
    <div class="nav-brand">
        <img src="assets/apc2.png" alt="APC" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">APC<span>.</span></span>
    </div>
    
    <!-- Center: Hamburger (mobile only) -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Right: Status items -->
    <div class="nav-status">
        <span class="nav-pill nav-pill-live">
            <span class="pulse-dot"></span> Live
        </span>
        <span class="nav-pill nav-pill-role" id="roleBadge">
            <i class="fas fa-shield-alt"></i> Admin
        </span>
        <span class="nav-time" id="liveClock">--:--:--</span>
    </div>
</nav>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-label">Operations</div>
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-compass"></i> <span>Command Center</span>
            </button>
            <button class="nav-item active">
                <i class="fas fa-file-import"></i> <span>New Submission</span>
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sign Out</span>
            </button>
        </aside>

        <main class="content-area">
            <div class="submission-card">
                <h2 class="card-title">Field Report: Winner Submission</h2>
                <p class="card-subtitle">Submit verified winner declaration from the field for review.</p>

                <form id="submissionForm" onsubmit="handleSubmission(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Candidate Full Name *</label>
                            <input type="text" class="form-input" placeholder="As per official records" required id="candidateName">
                        </div>
                        <div class="form-group">
                            <label>Office Contested *</label>
                            <select class="form-input" required id="office">
                                <option value="">Select Office</option>
                                <option>Governor</option>
                                <option>Senate</option>
                                <option>House of Representatives</option>
                                <option>State Assembly</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>State *</label>
                            <select class="form-input" required id="state">
                                <option value="">Select State</option>
                                <option>Kano</option><option>Lagos</option><option>Kaduna</option>
                                <option>Borno</option><option>Rivers</option><option>Enugu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Constituency/LGA *</label>
                            <input type="text" class="form-input" placeholder="Electoral constituency" required id="constituency">
                        </div>
                        <div class="form-group">
                            <label>Delegate Votes *</label>
                            <input type="number" class="form-input" placeholder="Vote count" required id="votes">
                        </div>
                        <div class="form-group">
                            <label>Declaration Date *</label>
                            <input type="date" class="form-input" required id="dateDeclared">
                        </div>
                        <div class="form-group">
                            <label>Venue *</label>
                            <input type="text" class="form-input" placeholder="E.g., APC State Secretariat" required id="venue">
                        </div>
                        <div class="form-group">
                            <label>Returning Officer *</label>
                            <input type="text" class="form-input" placeholder="Name of returning officer" required id="returningOfficer">
                        </div>
                        <div class="form-group full">
                            <label>Additional Notes</label>
                            <textarea class="form-input" placeholder="Any relevant information..." id="notes"></textarea>
                        </div>
                        <div class="form-group full">
                            <label>Supporting Documents</label>
                            <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p><strong>Click to upload</strong> or drag files</p>
                                <p style="color:var(--text-secondary);font-size:0.75rem;">Result sheets, photos (Max 10MB each)</p>
                            </div>
                            <input type="file" id="fileInput" multiple style="display:none;" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(event)">
                            <div id="fileList" style="margin-top:0.5rem;"></div>
                        </div>
                    </div>

                    <div id="submissionStatus" class="status-message"></div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> Submit Winner Declaration
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        // Update clock in top nav
function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        const options = {
            timeZone: 'Africa/Lagos',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        clockEl.textContent = now.toLocaleTimeString('en-NG', options) + ' WAT';
    }

    // Also update role badge
    const roleEl = document.getElementById('roleText');
    if (roleEl && roleEl.textContent === 'Loading...') {
        const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
        if (user.role) {
            roleEl.textContent = user.role.replace(/_/g, ' ').toUpperCase();
        }
    }
}

// Run immediately and then every second
updateClock();
setInterval(updateClock, 1000);
        function handleFileSelect(event) {
            const files = event.target.files;
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            for (let i = 0; i < files.length; i++) {
                const item = document.createElement('div');
                item.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.6rem;background:rgba(0,168,107,0.06);border-radius:0.4rem;margin-bottom:0.25rem;font-size:0.8rem;';
                item.innerHTML = `<i class="fas fa-file" style="color:var(--green);"></i> ${files[i].name} <span style="color:var(--text-secondary);font-size:0.7rem;">(${(files[i].size/1024).toFixed(1)} KB)</span>`;
                fileList.appendChild(item);
            }
        }

        function handleSubmission(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';

            const data = {
                candidateName: document.getElementById('candidateName').value,
                office: document.getElementById('office').value,
                state: document.getElementById('state').value,
                constituency: document.getElementById('constituency').value,
                votes: document.getElementById('votes').value,
                dateDeclared: document.getElementById('dateDeclared').value,
                venue: document.getElementById('venue').value,
                returningOfficer: document.getElementById('returningOfficer').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date().toISOString(),
                status: 'submitted'
            };

            setTimeout(() => {
                document.getElementById('submissionStatus').className = 'status-message status-success';
                document.getElementById('submissionStatus').innerHTML = `
                    <strong>✓ Submission Successful</strong><br>
                    ${data.candidateName} has been submitted for verification.<br>
                    <small>Reference: APC-${Date.now().toString(36).toUpperCase()}</small>
                `;
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Another Winner';
                document.getElementById('submissionForm').reset();
                document.getElementById('fileList').innerHTML = '';
            }, 2000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }
            document.getElementById('dateDeclared').value = new Date().toISOString().split('T')[0];
            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' WAT';
            }, 1000);
        });
    </script>

    <script>
// Quick test for hamburger button
document.addEventListener('DOMContentLoaded', function() {
    // Find or create a test button
    var btn = document.querySelector('.hamburger-btn');
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'hamburger-btn';
        btn.innerHTML = '<i class="fas fa-bars"></i>';
        btn.style.cssText = 'display:flex;position:fixed;top:70px;right:20px;z-index:9999;background:#00a86b;color:#fff;width:44px;height:44px;border-radius:8px;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;';
        document.body.appendChild(btn);
    }
    
    var sidebar = document.querySelector('.sidebar');
    
    btn.onclick = function() {
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
            if (sidebar.classList.contains('mobile-open')) {
                sidebar.style.transform = 'translateX(0)';
                btn.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                btn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        }
    };
});
</script>
</body>
</html>

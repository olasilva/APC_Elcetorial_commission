<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <script src="js/mobile-nav.js"></script>
    <style>
        :root {
            --navy-deep: #0a1628;
            --navy-panel: #0f2035;
            --text-primary: #dde4ed;
            --text-secondary: #8da0b8;
            --green: #00a86b;
            --gold: #c4a030;
            --border: rgba(255, 255, 255, 0.07);
            --red: #d94a4a;
            --amber: #d4a030;
            --blue: #4a8fc9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 1.75rem;
            background: rgba(10, 22, 40, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-brand img {
            height: 30px;
        }

        .nav-brand .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
        }

        .nav-brand .logo-text span {
            color: var(--green);
        }

        .nav-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 2rem;
        }

        .badge-live {
            background: rgba(0, 168, 107, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 168, 107, 0.3);
        }

        .badge-role {
            background: rgba(196, 160, 48, 0.1);
            color: var(--gold);
            border: 1px solid rgba(196, 160, 48, 0.2);
        }

        .nav-clock {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: rgba(13, 25, 42, 0.6);
            border-right: 1px solid var(--border);
            padding: 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-section {
            margin-bottom: 0.75rem;
        }

        .sidebar-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #5a7795;
            padding: 0.6rem 0.9rem 0.4rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.12s ease;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.84rem;
            margin-bottom: 0.1rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #c0d0e0;
        }

        .nav-item.active {
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            font-weight: 600;
        }

        .nav-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .nav-badge-count {
            background: var(--amber);
            color: #0a1628;
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.65rem;
            font-weight: 700;
            margin-left: auto;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #eef2f7;
            line-height: 1;
        }

        .stat-change {
            font-size: 0.75rem;
            margin-top: 0.3rem;
        }

        .change-positive {
            color: var(--green);
        }

        .change-warning {
            color: var(--amber);
        }

        .panel {
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 0.85rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 0.65rem 0.75rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 0.65rem 0.75rem;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 0.4rem;
        }

        .dot-submitted { background: var(--blue); }
        .dot-review { background: var(--amber); animation: pulse 2s infinite; }
        .dot-verified { background: var(--green); }
        .dot-disputed { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-xs {
            padding: 0.3rem 0.7rem;
            border-radius: 0.35rem;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.12s ease;
        }

        .btn-approve {
            background: var(--green);
            color: #fff;
        }

        .btn-approve:hover {
            background: #00955e;
        }

        .btn-flag {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-flag:hover {
            background: rgba(217, 74, 74, 0.1);
        }

        .btn-review-btn {
            background: transparent;
            border: 1px solid var(--amber);
            color: var(--amber);
        }

        .btn-review-btn:hover {
            background: rgba(212, 160, 48, 0.1);
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 1024px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 55px;
            }
            .nav-item span,
            .sidebar-label {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
    <!-- Left: Brand -->
    <div class="nav-brand">
        <img src="assets/apc2.png" alt="APC" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">APC<span>.</span></span>
    </div>
    
    <!-- Center: Hamburger (mobile only) -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Right: Status items -->
    <div class="nav-status">
        <span class="nav-pill nav-pill-live">
            <span class="pulse-dot"></span> Live
        </span>
        <span class="nav-pill nav-pill-role" id="roleBadge">
            <i class="fas fa-shield-alt"></i> Admin
        </span>
        <span class="nav-time" id="liveClock">--:--:--</span>
    </div>
</nav>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-label">Platform</div>
            <button class="nav-item active">
                <i class="fas fa-compass"></i> <span>Command Center</span>
            </button>
            <button class="nav-item" onclick="navigateTo('candidates.html')">
                <i class="fas fa-database"></i> <span>Winner Registry</span>
            </button>
            <button class="nav-item" onclick="navigateTo('analytics.html')">
                <i class="fas fa-chart-bar"></i> <span>Analytics</span>
            </button>
            
            <div class="sidebar-label">Operations</div>
            <button class="nav-item" onclick="navigateTo('field-submission.html')">
                <i class="fas fa-file-import"></i> <span>New Submission</span>
            </button>
            <button class="nav-item" onclick="scrollToPending()">
                <i class="fas fa-inbox"></i> <span>Pending Review</span>
                <span class="nav-badge-count" id="pendingCount">0</span>
            </button>
            
            <div class="sidebar-label">Elections</div>
            <button class="nav-item" onclick="navigateTo('primaries.html')">
                <i class="fas fa-vote-yea"></i> <span>Primary Elections</span>
            </button>
            <button class="nav-item" onclick="navigateTo('collation.html')">
                <i class="fas fa-calculator"></i> <span>Collation</span>
            </button>
            
            <div class="sidebar-label">System</div>
            <button class="nav-item" onclick="navigateTo('admin.html')">
                <i class="fas fa-shield-alt"></i> <span>Administration</span>
            </button>
            <button class="nav-item" onclick="navigateTo('profile.html')">
                <i class="fas fa-user"></i> <span>Profile</span>
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sign Out</span>
            </button>
        </aside>

        <main class="content-area">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card" onclick="navigateTo('primaries.html')">
                    <div class="stat-label">Active Primaries</div>
                    <div class="stat-value">4</div>
                    <div class="stat-change change-positive">All offices live</div>
                </div>
                <div class="stat-card" onclick="scrollToPending()">
                    <div class="stat-label">Pending Verifications</div>
                    <div class="stat-value" id="metricPending" style="color: var(--amber);">-</div>
                    <div class="stat-change change-warning">Requires attention</div>
                </div>
                <div class="stat-card" onclick="navigateTo('candidates.html')">
                    <div class="stat-label">Verified Winners</div>
                    <div class="stat-value" id="metricVerified">482</div>
                    <div class="stat-change change-positive">↑ 24 today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Disputes</div>
                    <div class="stat-value" style="color: var(--amber);">12</div>
                    <div class="stat-change">3 resolved</div>
                </div>
            </div>

            <!-- Pending Submissions + Activity -->
            <div class="grid-2col" id="pendingSection">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">Pending Submissions</span>
                        <select id="statusFilter" onchange="renderSubmissions()" style="background:rgba(20,40,60,0.6);border:1px solid var(--border);border-radius:0.4rem;padding:0.35rem 0.6rem;color:var(--text-primary);font-size:0.75rem;">
                            <option value="all">All</option>
                            <option value="submitted">Submitted</option>
                            <option value="under_review">Under Review</option>
                            <option value="disputed">Disputed</option>
                        </select>
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Candidate</th>
                                <th>Office</th>
                                <th>State</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsTable"></tbody>
                    </table>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">Recent Activity</span>
                        <span style="font-size:0.65rem;color:var(--green);">● Live</span>
                    </div>
                    <div id="activityFeed" style="max-height:400px;overflow-y:auto;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Data Management
        function getSubmissions() {
            return JSON.parse(localStorage.getItem('sentinel_submissions') || '[]');
        }

        function saveSubmissions(data) {
            localStorage.setItem('sentinel_submissions', JSON.stringify(data));
        }

        function getWinners() {
            return JSON.parse(localStorage.getItem('sentinel_winners') || '[]');
        }

        function saveWinners(data) {
            localStorage.setItem('sentinel_winners', JSON.stringify(data));
        }

        function seedData() {
            if (!localStorage.getItem('sentinel_submissions')) {
                const samples = [
                    { id: 'SUB-001', candidateName: 'Hon. Musa Ibrahim', office: 'Senate', state: 'Kano', votes: 1248, status: 'submitted', submittedAt: new Date().toISOString() },
                    { id: 'SUB-002', candidateName: 'Fatima Bello', office: 'House of Reps', state: 'Kaduna', votes: 876, status: 'under_review', submittedAt: new Date(Date.now()-7200000).toISOString() },
                    { id: 'SUB-003', candidateName: 'Dr. Chidi Okonkwo', office: 'Governor', state: 'Enugu', votes: 2103, status: 'verified', submittedAt: new Date(Date.now()-10800000).toISOString() },
                    { id: 'SUB-004', candidateName: 'Ngozi Adeola', office: 'House of Reps', state: 'Ogun', votes: 543, status: 'disputed', submittedAt: new Date(Date.now()-14400000).toISOString() }
                ];
                saveSubmissions(samples);
            }
            if (!localStorage.getItem('sentinel_winners')) {
                saveWinners([{ id: 'WIN-001', name: 'Dr. Chidi Okonkwo', office: 'Governor', state: 'Enugu', votes: 2103 }]);
            }
        }

        // Update clock in top nav
function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        const options = {
            timeZone: 'Africa/Lagos',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        clockEl.textContent = now.toLocaleTimeString('en-NG', options) + ' WAT';
    }

    // Also update role badge
    const roleEl = document.getElementById('roleText');
    if (roleEl && roleEl.textContent === 'Loading...') {
        const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
        if (user.role) {
            roleEl.textContent = user.role.replace(/_/g, ' ').toUpperCase();
        }
    }
}

// Run immediately and then every second
updateClock();
setInterval(updateClock, 1000);
        function renderSubmissions() {
            const subs = getSubmissions();
            const filter = document.getElementById('statusFilter')?.value || 'all';
            const filtered = filter === 'all' ? subs : subs.filter(s => s.status === filter);
            const tbody = document.getElementById('submissionsTable');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-secondary);">No submissions</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(s => {
                const statusLabels = { submitted: 'Submitted', under_review: 'Under Review', verified: 'Verified', disputed: 'Disputed' };
                const dotClass = `dot-${s.status}`;
                return `
                    <tr>
                        <td><strong>${s.candidateName}</strong></td>
                        <td>${s.office}</td>
                        <td>${s.state}</td>
                        <td><span class="status-dot ${dotClass}"></span>${statusLabels[s.status] || s.status}</td>
                        <td>
                            ${s.status === 'submitted' ? `<button class="btn-xs btn-approve" onclick="verifySubmission('${s.id}')">Approve</button>` : ''}
                            ${s.status === 'under_review' ? `<button class="btn-xs btn-approve" onclick="verifySubmission('${s.id}')">Approve</button>` : ''}
                            <button class="btn-xs btn-flag" onclick="flagDispute('${s.id}')">Flag</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function verifySubmission(id) {
            const subs = getSubmissions();
            const idx = subs.findIndex(s => s.id === id);
            if (idx !== -1) {
                subs[idx].status = 'verified';
                subs[idx].verifiedAt = new Date().toISOString();
                saveSubmissions(subs);

                const winners = getWinners();
                winners.unshift({ id: 'WIN-' + Date.now(), name: subs[idx].candidateName, office: subs[idx].office, state: subs[idx].state, votes: subs[idx].votes });
                saveWinners(winners);

                updateAll();
                showToast('Submission verified');
            }
        }

        function flagDispute(id) {
            const reason = prompt('Reason for dispute:');
            if (!reason) return;
            const subs = getSubmissions();
            const idx = subs.findIndex(s => s.id === id);
            if (idx !== -1) {
                subs[idx].status = 'disputed';
                subs[idx].disputeReason = reason;
                saveSubmissions(subs);
                updateAll();
                showToast('Submission flagged as disputed');
            }
        }

        function renderActivity() {
            const subs = getSubmissions().slice(0, 8);
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = subs.map(s => {
                const time = new Date(s.submittedAt).toLocaleTimeString('en-NG', { hour: '2-digit', minute: '2-digit' });
                return `<div style="padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:0.82rem;">
                    <strong>${s.candidateName}</strong> · ${s.office}, ${s.state} · <span style="color:var(--text-secondary);">${time}</span>
                    <span style="float:right;color:${s.status==='verified'?'var(--green)':s.status==='disputed'?'var(--red)':'var(--amber)'}">${s.status}</span>
                </div>`;
            }).join('');
        }

        function updateAll() {
            const subs = getSubmissions();
            const pending = subs.filter(s => s.status === 'submitted' || s.status === 'under_review').length;
            const verified = getWinners().length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('metricPending').textContent = pending;
            document.getElementById('metricVerified').textContent = verified;
            renderSubmissions();
            renderActivity();
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:rgba(0,168,107,0.9);color:#fff;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:600;z-index:999;font-size:0.85rem;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function scrollToPending() {
            document.getElementById('pendingSection').scrollIntoView({ behavior: 'smooth' });
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        function handleLogout() {
            if (confirm('Sign out of SENTINEL?')) {
                sessionStorage.clear();
                window.location.href = 'auth.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }
            seedData();
            updateAll();

            const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
            document.getElementById('roleBadge').textContent = user.role ? user.role.replace('_', ' ').toUpperCase() : 'Administrator';

            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' WAT';
            }, 1000);

            setInterval(updateAll, 15000);
        });
    </script>

    <script>
// Quick test for hamburger button
document.addEventListener('DOMContentLoaded', function() {
    // Find or create a test button
    var btn = document.querySelector('.hamburger-btn');
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'hamburger-btn';
        btn.innerHTML = '<i class="fas fa-bars"></i>';
        btn.style.cssText = 'display:flex;position:fixed;top:70px;right:20px;z-index:9999;background:#00a86b;color:#fff;width:44px;height:44px;border-radius:8px;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;';
        document.body.appendChild(btn);
    }
    
    var sidebar = document.querySelector('.sidebar');
    
    btn.onclick = function() {
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
            if (sidebar.classList.contains('mobile-open')) {
                sidebar.style.transform = 'translateX(0)';
                btn.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                btn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        }
    };
});
</script>
</body>
</html>

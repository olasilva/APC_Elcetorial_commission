<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · Primary Elections</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <script src="js/mobile-nav.js"></script>
    <style>
        :root {
            --navy-deep: #0a1628;
            --navy-panel: #0f2035;
            --text-primary: #dde4ed;
            --text-secondary: #8da0b8;
            --green: #00a86b;
            --gold: #c4a030;
            --border: rgba(255, 255, 255, 0.07);
            --blue: #4a8fc9;
            --purple: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 1.75rem;
            background: rgba(10, 22, 40, 0.94);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-brand img {
            height: 30px;
        }

        .nav-brand .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
        }

        .nav-brand .logo-text span {
            color: var(--green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 250px;
            background: rgba(13, 25, 42, 0.6);
            border-right: 1px solid var(--border);
            padding: 1.25rem 0.75rem;
            flex-shrink: 0;
        }

        .sidebar-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #5a7795;
            padding: 0.6rem 0.9rem 0.4rem;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 0.9rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.12s ease;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.84rem;
            margin-bottom: 0.1rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #c0d0e0;
        }

        .nav-item.active {
            background: rgba(0, 168, 107, 0.1);
            color: var(--green);
            font-weight: 600;
        }

        .nav-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .banner {
            background: linear-gradient(135deg, rgba(0, 120, 60, 0.2), rgba(0, 60, 30, 0.1));
            border: 1px solid rgba(0, 168, 107, 0.2);
            border-radius: 0.85rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .banner h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .countdown-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .countdown-block {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 1.25rem;
            border-radius: 0.75rem;
            text-align: center;
            min-width: 80px;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }

        .countdown-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .elections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .election-card {
            background: var(--navy-panel);
            border: 1px solid var(--border);
            border-radius: 0.85rem;
            padding: 1.25rem;
            transition: border-color 0.15s ease;
        }

        .election-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .office-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.7rem;
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge-governor { background: rgba(0, 168, 107, 0.15); color: var(--green); }
        .badge-senate { background: rgba(196, 160, 48, 0.15); color: var(--gold); }
        .badge-reps { background: rgba(74, 143, 201, 0.15); color: var(--blue); }
        .badge-assembly { background: rgba(139, 92, 246, 0.15); color: var(--purple); }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin: 0.75rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--green);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .btn {
            padding: 0.55rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.82rem;
            transition: background 0.12s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-primary {
            background: var(--green);
            color: #fff;
        }

        .btn-primary:hover {
            background: #00955e;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--green);
            color: var(--green);
        }

        .btn-gold {
            background: var(--gold);
            color: #0a1628;
            font-weight: 700;
        }

        .btn-gold:hover {
            background: #b8902a;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 55px;
            }
            .nav-item span,
            .sidebar-label {
                display: none;
            }
            .countdown-row {
                gap: 0.75rem;
            }
            .countdown-block {
                min-width: 60px;
                padding: 0.75rem;
            }
            .countdown-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
   <nav class="top-nav">
    <!-- Left: Brand -->
    <div class="nav-brand">
        <img src="assets/apc2.png" alt="APC" class="nav-logo-img" onerror="this.style.display='none'">
        <span class="nav-logo-text">APC<span>.</span></span>
    </div>
    
    <!-- Center: Hamburger (mobile only) -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Right: Status items -->
    <div class="nav-status">
        <span class="nav-pill nav-pill-live">
            <span class="pulse-dot"></span> Live
        </span>
        <span class="nav-pill nav-pill-role" id="roleBadge">
            <i class="fas fa-shield-alt"></i> Admin
        </span>
        <span class="nav-time" id="liveClock">--:--:--</span>
    </div>
</nav>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-label">Platform</div>
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-compass"></i> <span>Command Center</span>
            </button>
            <button class="nav-item" onclick="window.location.href='candidates.html'">
                <i class="fas fa-database"></i> <span>Winner Registry</span>
            </button>
            <button class="nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-bar"></i> <span>Analytics</span>
            </button>
            <div class="sidebar-label">Elections</div>
            <button class="nav-item active">
                <i class="fas fa-vote-yea"></i> <span>Primary Elections</span>
            </button>
            <button class="nav-item" onclick="window.location.href='accreditation.html'">
                <i class="fas fa-id-card"></i> <span>Accreditation</span>
            </button>
            <button class="nav-item" onclick="window.location.href='delegate-vote.html'">
                <i class="fas fa-check-circle"></i> <span>Voting Portal</span>
            </button>
            <button class="nav-item" onclick="window.location.href='collation.html'">
                <i class="fas fa-calculator"></i> <span>Collation</span>
            </button>
            <button class="nav-item" onclick="window.location.href='admin.html'">
                <i class="fas fa-shield-alt"></i> <span>Administration</span>
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> <span>Sign Out</span>
            </button>
        </aside>

        <main class="content-area">
            <div class="banner">
                <h1>2026 APC Primary Elections</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;">Nationwide delegate voting in progress</p>
                
                <div class="countdown-row">
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-days">03</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-hours">14</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-minutes">28</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-seconds">45</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
                <p style="color:var(--gold);font-size:0.8rem;">Until voting concludes</p>
            </div>

            <h2 style="font-size:1rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem;font-weight:600;">Active Primaries by Office</h2>

            <div class="elections-grid" id="electionsGrid"></div>

            <div style="text-align:center;margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
                <button class="btn btn-gold" onclick="window.location.href='accreditation.html'">
                    <i class="fas fa-id-card"></i> Proceed to Accreditation
                </button>
                <button class="btn btn-primary" onclick="window.location.href='delegate-vote.html'">
                    <i class="fas fa-vote-yea"></i> Go to Voting Portal
                </button>
            </div>
        </main>
    </div>

    <script>
        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        // Update clock in top nav
function updateClock() {
    const clockEl = document.getElementById('liveClock');
    if (clockEl) {
        const now = new Date();
        const options = {
            timeZone: 'Africa/Lagos',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        };
        clockEl.textContent = now.toLocaleTimeString('en-NG', options) + ' WAT';
    }

    // Also update role badge
    const roleEl = document.getElementById('roleText');
    if (roleEl && roleEl.textContent === 'Loading...') {
        const user = JSON.parse(sessionStorage.getItem('sentinel_user') || '{}');
        if (user.role) {
            roleEl.textContent = user.role.replace(/_/g, ' ').toUpperCase();
        }
    }
}

// Run immediately and then every second
updateClock();
setInterval(updateClock, 1000);
        const activePrimaries = [
            { office: 'Governor', states: ['Lagos', 'Kano', 'Kaduna', 'Borno', 'Rivers', 'Enugu', 'Oyo'], progress: 78, badge: 'badge-governor' },
            { office: 'Senate', states: ['All 36 States + FCT'], progress: 65, badge: 'badge-senate' },
            { office: 'House of Representatives', states: ['All 360 Federal Constituencies'], progress: 52, badge: 'badge-reps' },
            { office: 'State Assembly', states: ['All 36 States'], progress: 45, badge: 'badge-assembly' }
        ];

        function renderElections() {
            const grid = document.getElementById('electionsGrid');
            grid.innerHTML = activePrimaries.map(e => `
                <div class="election-card">
                    <span class="office-badge ${e.badge}">${e.office}</span>
                    <h3 style="font-size:1rem;margin-bottom:0.3rem;">${e.office} Primaries</h3>
                    <p style="color:var(--text-secondary);font-size:0.8rem;margin-bottom:0.75rem;">${e.states.join(' · ')}</p>
                    <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.3rem;">
                        <span style="color:var(--text-secondary);">Completion</span>
                        <span style="color:var(--green);font-weight:600;">${e.progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${e.progress}%;"></div>
                    </div>
                    <div style="display:flex;gap:0.5rem;margin-top:1rem;">
                        <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='delegate-vote.html'">
                            <i class="fas fa-vote-yea"></i> Vote
                        </button>
                        <button class="btn btn-outline" style="flex:1;" onclick="window.location.href='collation.html'">
                            <i class="fas fa-chart-bar"></i> Results
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateCountdown() {
            const endDate = new Date('2026-05-10T18:00:00');
            const now = new Date();
            const diff = endDate - now;

            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown-days').textContent = String(days).padStart(2, '0');
                document.getElementById('countdown-hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('countdown-minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('countdown-seconds').textContent = String(seconds).padStart(2, '0');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }

            renderElections();
            updateCountdown();
            setInterval(updateCountdown, 1000);

            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }) + ' WAT';
            }, 1000);
        });
    </script>

    <script>
// Quick test for hamburger button
document.addEventListener('DOMContentLoaded', function() {
    // Find or create a test button
    var btn = document.querySelector('.hamburger-btn');
    if (!btn) {
        btn = document.createElement('button');
        btn.className = 'hamburger-btn';
        btn.innerHTML = '<i class="fas fa-bars"></i>';
        btn.style.cssText = 'display:flex;position:fixed;top:70px;right:20px;z-index:9999;background:#00a86b;color:#fff;width:44px;height:44px;border-radius:8px;border:none;cursor:pointer;align-items:center;justify-content:center;font-size:20px;';
        document.body.appendChild(btn);
    }
    
    var sidebar = document.querySelector('.sidebar');
    
    btn.onclick = function() {
        if (sidebar) {
            sidebar.classList.toggle('mobile-open');
            if (sidebar.classList.contains('mobile-open')) {
                sidebar.style.transform = 'translateX(0)';
                btn.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                btn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        }
    };
});
</script>
</body>
</html>

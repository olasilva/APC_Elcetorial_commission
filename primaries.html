<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | Primary Elections Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sentinel-responsive.css">
    <script src="js/mobile-nav.js"></script>
    <style>
        :root {
            --deep-green: #006647;
            --gold: #d4af37;
            --midnight: #020c17;
            --intel-blue: #0f283f;
            --text-primary: #e6edf3;
            --text-secondary: #9bb7d4;
            --accent-green: #00b87a;
            --danger: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--midnight);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: rgba(2, 13, 26, 0.95);
            border-bottom: 1px solid rgba(0, 180, 120, 0.3);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .apc-emblem {
            background: linear-gradient(135deg, #0a4b33, #043322);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid var(--gold);
            color: #f5e7c6;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.9rem;
        }

        .sentinel-logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .sentinel-logo span {
            color: var(--accent-green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 260px;
            background: rgba(5, 16, 30, 0.9);
            border-right: 1px solid rgba(0, 180, 120, 0.2);
            padding: 1.5rem 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 184, 122, 0.15);
            color: var(--accent-green);
        }

        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .election-status-banner {
            background: linear-gradient(135deg, #006647, #003d2b);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--gold);
            text-align: center;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .countdown-block {
            background: rgba(0,0,0,0.4);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            text-align: center;
        }

        .countdown-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
        }

        .countdown-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .elections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .election-card {
            background: rgba(8, 20, 32, 0.8);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(0, 180, 120, 0.2);
            transition: 0.3s;
        }

        .election-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 184, 122, 0.2);
        }

        .election-card.active-election {
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 184, 122, 0.3);
        }

        .election-card.completed {
            border-color: #4a6a80;
            opacity: 0.7;
        }

        .office-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .badge-governor { background: rgba(0, 184, 122, 0.2); color: #00e08a; }
        .badge-senate { background: rgba(212, 175, 55, 0.2); color: #d4af37; }
        .badge-reps { background: rgba(65, 105, 225, 0.2); color: #6495ED; }
        .badge-assembly { background: rgba(138, 43, 226, 0.2); color: #BA55D3; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-green);
            border-radius: 10px;
            transition: width 0.5s;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--accent-green); color: white; }
        .btn-primary:hover { background: #00d48f; transform: translateY(-2px); }
        .btn-gold { background: var(--gold); color: #020c17; }
        .btn-gold:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <div class="apc-emblem">
    <img src="assets/apc2.png" alt="APC Logo" class="apc-logo-img">
</div>
            <div class="sentinel-logo">SENTINEL<span>.</span></div>
        </div>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span id="liveClock" style="font-weight:600;"></span>
            <span style="background: var(--accent-green); padding:0.3rem 1rem; border-radius:2rem; font-weight:600; animation: pulse 2s infinite;">
                <i class="fas fa-broadcast-tower"></i> LIVE
            </span>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-th-large"></i> Command Center
            </button>
            <button class="nav-item active">
                <i class="fas fa-vote-yea"></i> Primary Elections
            </button>
            <button class="nav-item" onclick="window.location.href='accreditation.html'">
                <i class="fas fa-id-card"></i> Accreditation
            </button>
            <button class="nav-item" onclick="window.location.href='delegate-vote.html'">
                <i class="fas fa-check-circle"></i> Voting Portal
            </button>
            <button class="nav-item" onclick="window.location.href='collation.html'">
                <i class="fas fa-calculator"></i> Collation Center
            </button>
            <button class="nav-item" onclick="window.location.href='candidates.html'">
                <i class="fas fa-database"></i> Winner Registry
            </button>
            <button class="nav-item" onclick="window.location.href='analytics.html'">
                <i class="fas fa-chart-pie"></i> Analytics
            </button>
            <button class="nav-item" onclick="window.location.href='admin.html'">
                <i class="fas fa-cog"></i> Admin
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main class="content-area">
            <div class="election-status-banner">
                <h1 style="font-size:1.8rem; margin-bottom:0.5rem;">
                    <i class="fas fa-vote-yea" style="color: var(--gold);"></i> 
                    2026 APC PRIMARY ELECTIONS
                </h1>
                <p style="color: var(--text-secondary);">Nationwide Delegate Voting In Progress</p>
                
                <div class="countdown-timer">
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-days">03</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-hours">14</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-minutes">28</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-block">
                        <div class="countdown-number" id="countdown-seconds">45</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
                <p style="color: var(--gold); font-size:0.9rem;">Until Voting Ends</p>
            </div>

            <h2 style="margin-bottom:1.5rem; color: var(--gold);">
                <i class="fas fa-calendar-alt"></i> ACTIVE PRIMARIES BY OFFICE
            </h2>

            <div class="elections-grid" id="electionsGrid">
                <!-- Populated by JavaScript -->
            </div>

            <div style="margin-top:2rem; text-align:center;">
                <button class="btn btn-gold" onclick="window.location.href='accreditation.html'">
                    <i class="fas fa-id-card"></i> PROCEED TO ACCREDITATION
                </button>
                <button class="btn btn-primary" onclick="window.location.href='delegate-vote.html'" style="margin-left:1rem;">
                    <i class="fas fa-vote-yea"></i> GO TO VOTING PORTAL
                </button>
            </div>
        </main>
    </div>

    <script>
        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        // Active Primaries Data
        const activePrimaries = [
            { office: 'Governor', states: ['Lagos', 'Kano', 'Kaduna', 'Borno', 'Rivers', 'Enugu', 'Oyo'], progress: 78, badge: 'badge-governor', status: 'active' },
            { office: 'Senate', states: ['All 36 States + FCT'], progress: 65, badge: 'badge-senate', status: 'active' },
            { office: 'House of Representatives', states: ['All 360 Federal Constituencies'], progress: 52, badge: 'badge-reps', status: 'active' },
            { office: 'State Assembly', states: ['All 36 States'], progress: 45, badge: 'badge-assembly', status: 'active' }
        ];

        function renderElections() {
            const grid = document.getElementById('electionsGrid');
            grid.innerHTML = activePrimaries.map(election => `
                <div class="election-card ${election.status === 'active' ? 'active-election' : ''}">
                    <span class="office-badge ${election.badge}">${election.office}</span>
                    <h3 style="margin-bottom:0.5rem;">${election.office} Primaries</h3>
                    <p style="color: var(--text-secondary); font-size:0.85rem; margin-bottom:1rem;">
                        ${election.states.join(' • ')}
                    </p>
                    <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                        <span style="font-size:0.8rem;">Completion</span>
                        <span style="color: var(--accent-green); font-weight:600;">${election.progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${election.progress}%;"></div>
                    </div>
                    <div style="margin-top:1rem; display:flex; gap:0.5rem;">
                        <button class="btn btn-primary" style="flex:1;" onclick="window.location.href='delegate-vote.html'">
                            <i class="fas fa-vote-yea"></i> Vote Now
                        </button>
                        <button class="btn" style="flex:1; background:transparent; border:1px solid var(--accent-green); color:var(--accent-green);" onclick="window.location.href='collation.html'">
                            <i class="fas fa-chart-bar"></i> View Results
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Countdown Timer
        function updateCountdown() {
            const endDate = new Date('2026-05-10T18:00:00'); // Voting ends May 10, 2026 6PM
            const now = new Date();
            const diff = endDate - now;

            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown-days').textContent = String(days).padStart(2, '0');
                document.getElementById('countdown-hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('countdown-minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('countdown-seconds').textContent = String(seconds).padStart(2, '0');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }

            renderElections();
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // Live clock
            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour12: false });
            }, 1000);
        });
    </script>
</body>
</html>

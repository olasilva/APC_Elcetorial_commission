<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL | Delegate Accreditation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --deep-green: #006647;
            --gold: #d4af37;
            --midnight: #020c17;
            --intel-blue: #0f283f;
            --text-primary: #e6edf3;
            --text-secondary: #9bb7d4;
            --accent-green: #00b87a;
            --danger: #ff4444;
            --warning: #ffa500;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--midnight);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: rgba(2, 13, 26, 0.95);
            border-bottom: 1px solid rgba(0, 180, 120, 0.3);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .apc-emblem {
            background: linear-gradient(135deg, #0a4b33, #043322);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid var(--gold);
            color: #f5e7c6;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .sentinel-logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .sentinel-logo span {
            color: var(--accent-green);
        }

        .main-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }

        .sidebar {
            width: 260px;
            background: rgba(5, 16, 30, 0.9);
            border-right: 1px solid rgba(0, 180, 120, 0.2);
            padding: 1.5rem 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 184, 122, 0.15);
            color: var(--accent-green);
        }

        .content-area {
            flex: 1;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .accreditation-card {
            background: rgba(8, 20, 32, 0.9);
            border-radius: 2rem;
            padding: 3rem;
            border: 1px solid rgba(0, 180, 120, 0.3);
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .verification-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .step {
            text-align: center;
            flex: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-weight: 700;
        }

        .step.active .step-circle {
            background: var(--accent-green);
        }

        .step.completed .step-circle {
            background: var(--accent-green);
        }

        .step-line {
            height: 2px;
            background: rgba(255,255,255,0.2);
            flex: 1;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 35, 55, 0.8);
            border: 1px solid rgba(0, 180, 120, 0.25);
            border-radius: 0.8rem;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(0, 184, 122, 0.2);
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-size: 1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--accent-green); color: white; }
        .btn-primary:hover { background: #00d48f; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .biometric-box {
            border: 2px dashed var(--accent-green);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .biometric-box:hover {
            background: rgba(0, 184, 122, 0.1);
        }

        .status-message {
            padding: 1rem;
            border-radius: 0.8rem;
            margin-top: 1rem;
            display: none;
        }

        .status-success {
            background: rgba(0, 184, 122, 0.2);
            color: #00e08a;
            border: 1px solid #00e08a;
            display: block;
        }

        .status-error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
           <div class="apc-emblem">
    <img src="assets/apc2.png" alt="APC Logo" class="apc-logo-img">
</div>>
            <div class="sentinel-logo">SENTINEL<span>.</span></div>
        </div>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span id="liveClock" style="font-weight:600;"></span>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <button class="nav-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-th-large"></i> Command Center
            </button>
            <button class="nav-item" onclick="window.location.href='primaries.html'">
                <i class="fas fa-vote-yea"></i> Primary Elections
            </button>
            <button class="nav-item active">
                <i class="fas fa-id-card"></i> Accreditation
            </button>
            <button class="nav-item" onclick="window.location.href='delegate-vote.html'">
                <i class="fas fa-check-circle"></i> Voting Portal
            </button>
            <button class="nav-item" onclick="window.location.href='collation.html'">
                <i class="fas fa-calculator"></i> Collation Center
            </button>
            <button class="nav-item" onclick="window.location.href='candidates.html'">
                <i class="fas fa-database"></i> Winner Registry
            </button>
            <button class="nav-item" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>

        <main class="content-area">
            <div class="accreditation-card">
                <div style="text-align:center; margin-bottom:2rem;">
                    <h2 style="color: var(--gold); margin-bottom:0.5rem;">
                        <i class="fas fa-fingerprint"></i> DELEGATE ACCREDITATION
                    </h2>
                    <p style="color: var(--text-secondary);">Verify your identity to proceed to voting</p>
                </div>

                <div class="verification-steps">
                    <div class="step active" id="step1">
                        <div class="step-circle">1</div>
                        <small>ID Check</small>
                    </div>
                    <div class="step-line"></div>
                    <div class="step" id="step2">
                        <div class="step-circle">2</div>
                        <small>Biometric</small>
                    </div>
                    <div class="step-line"></div>
                    <div class="step" id="step3">
                        <div class="step-circle">3</div>
                        <small>Approved</small>
                    </div>
                </div>

                <form id="accreditationForm" onsubmit="handleAccreditation(event)">
                    <div class="form-group">
                        <label>APC Membership ID *</label>
                        <input type="text" class="form-input" placeholder="APC/NG/2026/..." required>
                    </div>

                    <div class="form-group">
                        <label>Delegate Card Number *</label>
                        <input type="text" class="form-input" placeholder="Enter your delegate card number" required>
                    </div>

                    <div class="form-group">
                        <label>State of Delegation *</label>
                        <select class="form-input" required>
                            <option value="">Select State</option>
                            <option>Lagos</option><option>Kano</option><option>Kaduna</option>
                            <option>Borno</option><option>Rivers</option><option>Enugu</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Ward</label>
                        <input type="text" class="form-input" placeholder="Your ward">
                    </div>

                    <div class="biometric-box" onclick="simulateBiometric()">
                        <i class="fas fa-fingerprint" style="font-size:3rem; color: var(--accent-green); margin-bottom:1rem;"></i>
                        <h4>Fingerprint Verification</h4>
                        <p style="color: var(--text-secondary); font-size:0.9rem;">Click to scan fingerprint</p>
                    </div>

                    <div id="statusMessage" class="status-message"></div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-check-circle"></i> VERIFY & PROCEED
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function handleLogout() {
            sessionStorage.clear();
            window.location.href = 'auth.html';
        }

        let biometricVerified = false;

        function simulateBiometric() {
            const bioBox = document.querySelector('.biometric-box');
            bioBox.style.borderColor = '#00e08a';
            bioBox.style.background = 'rgba(0, 184, 122, 0.15)';
            
            setTimeout(() => {
                biometricVerified = true;
                document.getElementById('statusMessage').className = 'status-message status-success';
                document.getElementById('statusMessage').innerHTML = '✅ Biometric verification successful';
                
                // Update steps
                document.getElementById('step2').classList.add('completed');
            }, 2000);
        }

        function handleAccreditation(e) {
            e.preventDefault();
            
            if (!biometricVerified) {
                document.getElementById('statusMessage').className = 'status-message status-error';
                document.getElementById('statusMessage').innerHTML = '❌ Please complete biometric verification first';
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> VERIFYING...';

            setTimeout(() => {
                // Store accreditation token
                sessionStorage.setItem('delegate_accredited', 'true');
                sessionStorage.setItem('accreditation_time', new Date().toISOString());
                
                document.getElementById('statusMessage').className = 'status-message status-success';
                document.getElementById('statusMessage').innerHTML = '✅ Accreditation successful! Redirecting to voting portal...';
                
                document.getElementById('step3').classList.add('completed');
                
                setTimeout(() => {
                    window.location.href = 'delegate-vote.html';
                }, 1500);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('sentinel_auth')) {
                window.location.href = 'auth.html';
                return;
            }

            setInterval(() => {
                document.getElementById('liveClock').textContent = 
                    new Date().toLocaleTimeString('en-NG', { timeZone: 'Africa/Lagos', hour12: false });
            }, 1000);
        });
    </script>
</body>
</html>

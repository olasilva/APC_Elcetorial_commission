<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL - Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020c17;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(0, 166, 107, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            position: relative;
        }

        .auth-card {
            background: rgba(8, 20, 36, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 180, 120, 0.2);
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .apc-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #006647, #003d2b);
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            border: 1px solid #d4af37;
            margin-bottom: 1.5rem;
        }

        .apc-badge i {
            color: #d4af37;
            font-size: 1.2rem;
        }

        .apc-badge span {
            color: #f5e7c6;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .auth-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e0e8f0;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        .auth-title span {
            color: #00b87a;
        }

        .auth-subtitle {
            color: #7f95aa;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 0.3rem;
        }

        .tab {
            flex: 1;
            padding: 0.8rem;
            text-align: center;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            color: #7f95aa;
            border: none;
            background: transparent;
            font-size: 0.95rem;
        }

        .tab.active {
            background: #00b87a;
            color: #020c17;
            box-shadow: 0 5px 15px rgba(0, 184, 122, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #9bb7d4;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #4a6a80;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(15, 35, 55, 0.8);
            border: 1px solid rgba(0, 180, 120, 0.25);
            border-radius: 0.8rem;
            color: #e6edf3;
            font-size: 0.95rem;
            transition: 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #00b87a;
            box-shadow: 0 0 15px rgba(0, 184, 122, 0.2);
        }

        .form-input::placeholder {
            color: #5a7a90;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00a86b, #008055);
            border: none;
            border-radius: 0.8rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00c97e, #00a86b);
            box-shadow: 0 10px 30px rgba(0, 184, 122, 0.3);
            transform: translateY(-2px);
        }

        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #5a7a90;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .security-note i {
            color: #00b87a;
        }

        .form-hidden {
            display: none;
        }

        @media (max-width: 500px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="apc-badge">
                    <i class="fas fa-flag"></i>
                    <span>ALL PROGRESSIVES CONGRESS</span>
                </div>
                <h1 class="auth-title">SENTINEL<span>.</span></h1>
                <p class="auth-subtitle">SECURE COMMAND ACCESS</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">LOGIN</button>
                <button class="tab" onclick="switchTab('signup')">SIGN UP</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>CREDENTIAL ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" class="form-input" placeholder="Enter APC credential ID" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="accent-color: #00b87a;"> Remember me
                    </label>
                    <a href="#" style="color: #00b87a; font-size: 0.85rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-shield-haltered"></i> ACCESS COMMAND CENTER
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="form-hidden" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" class="form-input" placeholder="As per APC records" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>APC MEMBERSHIP ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input type="text" class="form-input" placeholder="APC/NG/..." required>
                    </div>
                </div>
                <div class="form-group">
                    <label>STATE OF ORIGIN</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select class="form-input" style="padding-left: 2.8rem;" required>
                            <option value="">Select State</option>
                            <option>Lagos</option><option>Kano</option><option>Kaduna</option>
                            <option>Borno</option><option>Rivers</option><option>Enugu</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" placeholder="Minimum 8 characters" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i> REQUEST ACCESS
                </button>
            </form>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                256-bit encrypted connection • Authorized personnel only
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');

            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.classList.remove('form-hidden');
                signupForm.classList.add('form-hidden');
            } else {
                tabs[1].classList.add('active');
                signupForm.classList.remove('form-hidden');
                loginForm.classList.add('form-hidden');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            // Simulate authentication
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AUTHENTICATING...';
            
            setTimeout(() => {
                // Store session
                sessionStorage.setItem('sentinel_auth', 'true');
                sessionStorage.setItem('sentinel_user', JSON.stringify({
                    name: 'Admin User',
                    role: 'National Editor',
                    clearance: 'Level 5'
                }));
                window.location.href = 'dashboard.html';
            }, 1500);
        }

        function handleSignup(e) {
            e.preventDefault();
            alert('SIGNUP REQUEST SUBMITTED\n\nYour access request has been sent to APC National Secretariat for verification. You will receive a response within 24 hours.');
        }
    </script>
</body>
</html>

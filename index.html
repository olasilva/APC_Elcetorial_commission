<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL · APC Electoral Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a1628;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-wrapper {
            text-align: center;
            max-width: 420px;
            padding: 2rem;
        }

        .logo-container {
            margin-bottom: 3rem;
        }

        .logo-container img {
            width: 100px;
            height: auto;
            object-fit: contain;
        }

        .logo-fallback {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #006647, #003d2b);
            border: 2px solid #c4a030;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            color: #fff;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .brand-name {
            margin-top: 1.25rem;
            color: #dde4ed;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .brand-name span {
            color: #00a86b;
        }

        .brand-tagline {
            color: #5a7795;
            font-size: 0.7rem;
            letter-spacing: 3px;
            margin-top: 0.3rem;
            text-transform: uppercase;
        }

        .loader-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            margin-top: 2.5rem;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            background: linear-gradient(90deg, #006647, #00a86b);
            width: 0%;
            animation: loadProgress 2.5s ease-in-out forwards;
            border-radius: 2px;
        }

        .status-text {
            color: #5a7795;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-top: 1.25rem;
            text-transform: uppercase;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 35%; }
            60% { width: 70%; }
            85% { width: 90%; }
            100% { width: 100%; }
        }

        .particle {
            position: fixed;
            width: 1px;
            height: 1px;
            background: #00a86b;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 4s infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.2; }
            100% { transform: translateY(-100vh) translateX(40px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="particlesContainer"></div>

    <div class="splash-wrapper">
        <div class="logo-container" id="logoContainer">
            <img src="assets/apc2.png" alt="APC" id="apcLogo" 
                 onerror="handleLogoError()">
        </div>
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
        <p class="status-text" id="statusMessage">Initializing Secure Protocol</p>
    </div>

    <script>
        function handleLogoError() {
            const logoImg = document.getElementById('apcLogo');
            if (logoImg) logoImg.style.display = 'none';
            const container = document.getElementById('logoContainer');
            const fallback = document.createElement('div');
            fallback.className = 'logo-fallback';
            fallback.textContent = 'APC';
            container.appendChild(fallback);
        }

        function createParticles() {
            const container = document.getElementById('particlesContainer');
            for (let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.bottom = '0';
                p.style.animationDelay = Math.random() * 4 + 's';
                p.style.animationDuration = (Math.random() * 3 + 3) + 's';
                container.appendChild(p);
            }
        }

        const messages = [
            'Initializing Secure Protocol',
            'Establishing Encrypted Connection',
            'Verifying National Database',
            'Loading Electoral Intelligence',
            'Synchronizing Real-time Feeds',
            'Access Granted'
        ];

        let msgIndex = 0;
        const statusEl = document.getElementById('statusMessage');

        const msgInterval = setInterval(() => {
            msgIndex++;
            if (msgIndex < messages.length) {
                statusEl.style.opacity = '0';
                setTimeout(() => {
                    statusEl.textContent = messages[msgIndex];
                    statusEl.style.opacity = '1';
                }, 150);
            } else {
                clearInterval(msgInterval);
            }
        }, 400);

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            statusEl.style.transition = 'opacity 0.2s ease';

            setTimeout(() => {
                document.querySelector('.splash-wrapper').style.opacity = '0';
                document.querySelector('.splash-wrapper').style.transition = 'opacity 0.4s ease';
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 400);
            }, 3000);
        });
    </script>
</body>
</html>

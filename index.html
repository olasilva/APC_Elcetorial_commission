<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL - APC National Electoral Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #020c17;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            position: relative;
        }

        .apc-emblem {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            animation: pulse 2s infinite;
        }

        .apc-logo-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #006647, #003d2b);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #d4af37;
            box-shadow: 0 0 40px rgba(0, 166, 107, 0.4);
        }

        .apc-text {
            color: #ffffff;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .sentinel-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 8px;
            color: #e0e8f0;
            margin: 1.5rem 0;
            text-transform: uppercase;
        }

        .sentinel-title span {
            color: #00b87a;
        }

        .subtitle {
            color: #9bb7d4;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 2rem;
        }

        .progress-bar {
            width: 280px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2rem auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b87a, #d4af37);
            width: 0%;
            animation: loading 2.5s ease-in-out forwards;
            border-radius: 10px;
        }

        .status-text {
            color: #7f95aa;
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00b87a;
            border-radius: 50%;
            animation: float 3s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="apc-emblem">
            <div class="apc-emblem">
    <img src="assets/apc2.png" alt="APC Logo" class="apc-logo-img">
</div>
        </div>
        
        <h1 class="sentinel-title">SENTINEL<span>.</span></h1>
        <p class="subtitle">NATIONAL ELECTORAL INTELLIGENCE COMMAND</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p class="status-text" id="statusMessage">INITIALIZING SECURE COMMAND PROTOCOL...</p>
    </div>

    <div class="particles" id="particles"></div>

    <script>
        // Generate particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particlesContainer.appendChild(particle);
        }

        // Status messages sequence
        const statusMessages = [
            'INITIALIZING SECURE COMMAND PROTOCOL...',
            'ESTABLISHING ENCRYPTED CONNECTION...',
            'VERIFYING NATIONAL DATABASE...',
            'LOADING ELECTORAL INTELLIGENCE...',
            'SYNCHRONIZING REAL-TIME FEEDS...',
            'ACCESS GRANTED - REDIRECTING...'
        ];

        let messageIndex = 0;
        const statusElement = document.getElementById('statusMessage');

        const messageInterval = setInterval(() => {
            messageIndex++;
            if (messageIndex < statusMessages.length) {
                statusElement.textContent = statusMessages[messageIndex];
            } else {
                clearInterval(messageInterval);
            }
        }, 400);

        // Redirect to auth page after loading
        setTimeout(() => {
            window.location.href = 'auth.html';
        }, 3000);
    </script>
</body>
</html>
